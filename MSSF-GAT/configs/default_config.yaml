model:
  name: "JointTextGATv2"
  hidden_dim: 256
  num_gat_layers: 1
  gat_heads: 1
  dropout: 0.0
  mlp_hidden_dim: 256
  use_raw_readout: true

# model:
#   name: "JointTextGCN"
#   hidden_dim: 64
#   num_gcn_layers: 2
#   dropout: 0.3
#   mlp_hidden_dim: 128

train:
  batch_size: 32
  lr: 0.004089
  weight_decay: 2.9376977049225005e-07
  num_epochs: 100
  threshold_candidates: [0.1, 0.15, 0.2, 0.25, 0.3, 0.35, 0.4, 0.45, 0.5]
  max_pos_weight: 5.0
  early_stopping_patience: 8
  early_stopping_min_delta: 0.0001

pyg_dataset:
  save_train_dataset: true
  save_val_dataset: true
  save_test_dataset: true
  save_full_dataset: false

logging:
  level: "INFO"
  save_logs: true
  log_dir: "C:/Users/Administrator/Desktop/ModelSet_GAT_Project/logs"

checkpoints:
  save_dir: "C:/Users/Administrator/Desktop/ModelSet_GAT_Project/checkpoints"

results:
  save_dir: "C:/Users/Administrator/Desktop/ModelSet_GAT_Project/results"